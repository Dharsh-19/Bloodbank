<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donor Registration | BloodBank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">🩸 BloodBank</div>
  <nav>
   <nav>
    <a href="home.html">Home</a>
    <a href="availability.html">Blood Availability</a>
    <a href="donor.html">Donate</a>
    <a href="emergency.html">Emergency</a>
    <a href="index.html" class="logout">Logout</a>
  </nav>
  </nav>
</header>

<!-- DONOR PAGE -->
<section class="donor-page">
  <div class="donor-header">
    <h1>Donor Registration</h1>
    <p>
      Register as a voluntary blood donor and help save lives.
      Your contribution can make a difference.
    </p>
  </div>

  <form class="donor-form" onsubmit="event.preventDefault(); alert('Donor registered successfully');">

    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" required>
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Blood Group</label>
        <select required>
          <option value="">Select</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option>
          <option>AB+</option><option>AB-</option>
        </select>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" required>
      </div>
    </div>

    <div class="form-group">
      <label>City</label>
      <input type="text" required>
    </div>

    <button type="submit" class="btn-primary">
      Register as Donor
    </button>

  </form>
</section>

</body>
</html>
